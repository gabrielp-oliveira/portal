<ng-container *ngIf="settings$ | async as settings">
  <header class="header" [class.dark]="!settings.theme">

    <!-- Grupo 1: Ícone home -->
    <div class="header-group">
      <button class="btn-flat" routerLink="/">
        <picture>
          <source
            type="image/avif"
            [srcset]="!settings.theme ? 'https://res.cloudinary.com/dyibidxxv/image/upload/v1772918274/homeDarkIcon_efk1t3.avif' : 'https://res.cloudinary.com/dyibidxxv/image/upload/v1772918274/homeLightIcon_opxauw.avif'" />
          <source
            type="image/webp"
            [srcset]="!settings.theme ? 'https://res.cloudinary.com/dyibidxxv/image/upload/v1772918274/homeDarkIcon_hook0j.webp' : 'https://res.cloudinary.com/dyibidxxv/image/upload/v1772918274/homeLightIcon_h25jyb.webp'" />
          <img
            [src]="!settings.theme ? 'https://res.cloudinary.com/dyibidxxv/image/upload/v1772918274/homeDarkIcon_hook0j.webp' : 'https://res.cloudinary.com/dyibidxxv/image/upload/v1772918274/homeLightIcon_h25jyb.webp'"
            alt="PaperTrail Home"
            class="home-icon" />
        </picture>
      </button>
    </div>
    <div class="header-group">

    <!-- Grupo 2: Navegação central -->
    <div class="header-group middle-group">
      <button class="btn-flat" routerLink="/store">
        <mat-icon>shopping_cart</mat-icon>
        <span>Store</span>
      </button>

      <button class="btn-flat" routerLink="/library">
        <mat-icon>library_books</mat-icon>
        <span>Library</span>
      </button>
    </div>

    <!-- Grupo 3: Ações -->
      <button class="btn-flat" (click)="toggleTheme(settings)">
        <mat-icon>
          {{ settings.theme ? 'dark_mode' : 'light_mode' }}
        </mat-icon>
        <span>Modo</span>
      </button>

      <button class="btn-flat" (click)="shareWorld()">
        <mat-icon>share</mat-icon>
        <span>Compartilhar</span>
      </button>

      <div class="user-icon">👤</div>
    </div>

  </header>
</ng-container>
