<div class="rw-root" [class.dark]="isDark">
  <app-header></app-header>

  <app-rw-hero
    [phaseHeroLoaded]="phaseHeroLoaded"
    [heroData]="heroData"
    [paperCardList]="paperCardList"
    [readingPct]="readingPct"
    [totalChapters]="totalChapters"
    [totalCompletedChapters]="totalCompletedChapters"
    [totalFavorites]="totalFavorites"
    [totalAnnotations]="totalAnnotations"
    [completedBooks]="completedBooks"
    [backdropCover]="backdropCover"
    [uniqueAuthors]="uniqueAuthors">
  </app-rw-hero>

  <!-- Continue reading banner -->
  <section class="continue-banner" aria-label="Continue reading" *ngIf="nextRead">
    <div class="cb-inner">
      <mat-icon class="cb-icon" aria-hidden="true">play_circle</mat-icon>
      <div class="cb-text">
        <span class="cb-label">Continue reading</span>
        <span class="cb-chapter">
          {{ nextRead.card.paper.name }} · Ch.{{ nextRead.chapterOrder }} — {{ nextRead.chapterTitle }}
        </span>
      </div>
      <button class="cb-btn" (click)="continueReading()"
              [attr.aria-label]="'Continue reading: ' + nextRead.card.paper.name + ' chapter ' + nextRead.chapterOrder">
        <mat-icon aria-hidden="true">arrow_forward</mat-icon> Pick up where you left off
      </button>
    </div>
  </section>

  <app-rw-board
    [phaseBoardLoaded]="phaseBoardLoaded"
    [worldName]="currentWorldName"
    (chapterClick)="onBoardChapterClick($event)"
    (groupClick)="onBoardGroupClick($event)">
  </app-rw-board>

  <app-rw-chapter-menu
    *ngIf="chapterMenuChapter"
    [position]="chapterMenu!"
    [chapter]="chapterMenuChapter"
    [paperName]="chapterMenuPaperName"
    [paperCoverUrl]="chapterMenuPaperCoverUrl"
    [paperColor]="chapterMenuPaperColor"
    [expanded]="chapterMenuExpanded"
    [timelineName]="chapterMenuTimelineName"
    [storylineName]="chapterMenuStorylineName"
    (close)="closeMenus()"
    (navigate)="navigate($event)"
    (openDetails)="openChapterDetails($event)"
    (toggleExpanded)="chapterMenuExpanded = !chapterMenuExpanded">
  </app-rw-chapter-menu>

  <app-rw-group-menu
    *ngIf="groupMenuItems.length"
    [position]="groupMenu!"
    [items]="groupMenuItems"
    (close)="closeMenus()"
    (navigate)="navigate($event)"
    (openDetails)="openChapterDetails($event)">
  </app-rw-group-menu>

  <app-rw-favorites
    [favoriteItems]="favoriteItems"
    [favoritesMeta]="favoritesMeta"
    [favoritesLoading]="favoritesLoading"
    [favoritesLoaded]="favoritesLoaded"
    [favSearch]="favSearch"
    [favBookFilter]="favBookFilter"
    [paperCardList]="paperCardList"
    (favSearchChange)="favSearch = $event; reloadFavorites()"
    (favBookFilterChange)="favBookFilter = $event; reloadFavorites()"
    (loadMore)="loadMoreFavorites()"
    (navigate)="navigate($event)"
    (resetSearch)="resetFavSearch()">
  </app-rw-favorites>

  <app-rw-books
    [filteredCards]="filteredCards"
    [booksStatusFilter]="booksStatusFilter"
    [searchQuery]="searchQuery"
    (statusFilterChange)="booksStatusFilter = $event"
    (searchQueryChange)="searchQuery = $event">
  </app-rw-books>

  <app-rw-notes
    [detailsItems]="detailsItems"
    [detailsMeta]="detailsMeta"
    [detailsLoading]="detailsLoading"
    [detailsLoaded]="detailsLoaded"
    [annotationQuery]="annotationQuery"
    [annotationFilter]="annotationFilter"
    [annotationBook]="annotationBook"
    [annotationSort]="annotationSort"
    [paperCardList]="paperCardList"
    (annotationQueryChange)="annotationQuery = $event; reloadDetails()"
    (annotationFilterChange)="annotationFilter = $event; reloadDetails()"
    (annotationBookChange)="annotationBook = $event; reloadDetails()"
    (annotationSortChange)="annotationSort = $event; reloadDetails()"
    (loadMore)="loadMoreDetails()"
    (navigate)="navigate($event)">
  </app-rw-notes>

  <app-footer></app-footer>

  <button class="scroll-top-fab" *ngIf="showScrollTop"
          (click)="scrollToTop()"
          aria-label="Back to top"
          matTooltip="Back to top" matTooltipPosition="left">
    <mat-icon aria-hidden="true">arrow_upward</mat-icon>
  </button>
</div>
