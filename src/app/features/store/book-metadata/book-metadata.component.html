<section class="metadata-section"
  *ngIf="book.isbn_10 || book.isbn_13 || book.publisher || book.maturity || book.genre?.length || book.language || book.year || book.total_pages">

  <h2 class="meta-heading">Book details</h2>

  <div class="meta-grid">

    <div class="meta-cell" *ngIf="book.genre?.length">
      <span class="cell-label">Genre</span>
      <div class="cell-chips">
        <span class="cell-chip" *ngFor="let g of book.genre">{{ g }}</span>
      </div>
    </div>

    <div class="meta-cell" *ngIf="book.maturity">
      <span class="cell-label">Audience</span>
      <span class="cell-badge"
        [class.mature]="book.maturity === 'MATURE'"
        [class.teen]="book.maturity === 'TEEN'"
        [class.everyone]="book.maturity === 'NOT_MATURE'">
        {{ maturityLabel }}
      </span>
    </div>

    <div class="meta-cell" *ngIf="book.language">
      <span class="cell-label">Language</span>
      <span class="cell-value">{{ book.language }}</span>
    </div>

    <div class="meta-cell" *ngIf="book.total_pages">
      <span class="cell-label">Pages</span>
      <span class="cell-value">{{ book.total_pages | number }}</span>
    </div>

    <div class="meta-cell" *ngIf="book.year">
      <span class="cell-label">Published</span>
      <span class="cell-value">{{ book.year }}</span>
    </div>

    <div class="meta-cell" *ngIf="book.publisher">
      <span class="cell-label">Publisher</span>
      <span class="cell-value">{{ book.publisher }}</span>
    </div>

    <div class="meta-cell" *ngIf="book.isbn_10">
      <span class="cell-label">ISBN-10</span>
      <span class="cell-value cell-value--mono">{{ book.isbn_10 }}</span>
    </div>

    <div class="meta-cell" *ngIf="book.isbn_13">
      <span class="cell-label">ISBN-13</span>
      <span class="cell-value cell-value--mono">{{ book.isbn_13 }}</span>
    </div>

  </div>
</section>
