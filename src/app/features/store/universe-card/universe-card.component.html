<mat-card class="universe-card">
  <!-- Capas agrupadas -->
<div class="covers-container">
  <!-- Quando há 3 ou mais capas -->
  <ng-container *ngIf="(world?.CoverURLs?.length || 0) >= 3; else twoCovers">
    <img [src]="(world.CoverURLs[0] || DEFAULT_COVER) | cloudinary:150:225"
         [srcset]="((world.CoverURLs[0] || DEFAULT_COVER) | cloudinary:150:225) + ' 1x, ' + ((world.CoverURLs[0] || DEFAULT_COVER) | cloudinary:300:450) + ' 2x'"
         class="cover cover-0" width="150" height="225" loading="lazy" decoding="async" alt="" />
    <img [src]="(world.CoverURLs[1] || DEFAULT_COVER) | cloudinary:150:225"
         [srcset]="((world.CoverURLs[1] || DEFAULT_COVER) | cloudinary:150:225) + ' 1x, ' + ((world.CoverURLs[1] || DEFAULT_COVER) | cloudinary:300:450) + ' 2x'"
         class="cover cover-1" width="150" height="225" loading="lazy" decoding="async" alt="" />
    <img [src]="(world.CoverURLs[2] || DEFAULT_COVER) | cloudinary:150:225"
         [srcset]="((world.CoverURLs[2] || DEFAULT_COVER) | cloudinary:150:225) + ' 1x, ' + ((world.CoverURLs[2] || DEFAULT_COVER) | cloudinary:300:450) + ' 2x'"
         class="cover cover-2" width="150" height="225" loading="lazy" decoding="async" alt="" />
  </ng-container>

  <!-- Quando há apenas 2 capas -->
  <ng-template #twoCovers>
    <img [src]="(world.CoverURLs[0] || DEFAULT_COVER) | cloudinary:150:225"
         [srcset]="((world.CoverURLs[0] || DEFAULT_COVER) | cloudinary:150:225) + ' 1x, ' + ((world.CoverURLs[0] || DEFAULT_COVER) | cloudinary:300:450) + ' 2x'"
         class="cover cover-1-center" width="150" height="225" loading="lazy" decoding="async" alt="" />
    <img [src]="(world.CoverURLs[1] || DEFAULT_COVER) | cloudinary:150:225"
         [srcset]="((world.CoverURLs[1] || DEFAULT_COVER) | cloudinary:150:225) + ' 1x, ' + ((world.CoverURLs[1] || DEFAULT_COVER) | cloudinary:300:450) + ' 2x'"
         class="cover cover-2-center" width="150" height="225" loading="lazy" decoding="async" alt="" />
  </ng-template>

  <!-- Logo central -->
  <div class="logo-overlay">
    <img src="https://res.cloudinary.com/dyibidxxv/image/upload/v1772918274/homeLightIcon_h25jyb.webp" alt="" aria-hidden="true" width="48" height="48" />
  </div>
</div>



  <!-- Nome do universo -->
  <h2 class="title">{{ world.name || "" }}</h2>
  <p class="count">{{ world.PaperCount }} book{{ world.PaperCount > 1 ? 's' : '' }}</p>

  <!-- Descrição curta -->

  <!-- Autores -->
  <div *ngIf="world.Authors?.length" class="meta-line">
    <strong>Authors:</strong>
    <span class="meta-list" matTooltip="{{ world.Authors.join(', ') }}">
      {{ world.Authors.slice(0, 2).join(', ') }}<span *ngIf="world.Authors.length > 2"> and other(s).</span>
    </span>
  </div>

  <!-- Gêneros -->
  <div *ngIf="world.Genres?.length" class="meta-line">
    <strong>Genres:</strong>
    <span class="meta-list" matTooltip="{{ world.Genres.join(', ') }}">
      {{ world.Genres.slice(0, 2).join(', ') }}<span *ngIf="world.Genres.length > 2"> and more.</span>
    </span>
  </div>

  <!-- Botão de ação -->
  <button mat-raised-button color="accent" class="universe-button" (click)="goToStoreUniverse()" *ngIf="!library">
    Universe Details
  </button>
</mat-card>
