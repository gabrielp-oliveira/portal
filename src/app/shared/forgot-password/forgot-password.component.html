<div class="auth-page">

  <!-- Brand panel -->
  <div class="brand-panel">
    <div class="brand-decoration">
      <div class="deco-circle c1"></div>
      <div class="deco-circle c2"></div>
      <div class="deco-circle c3"></div>
    </div>
    <div class="brand-content">
      <picture>
        <source type="image/avif" srcset="https://res.cloudinary.com/dyibidxxv/image/upload/v1772918274/homeLightIcon_opxauw.avif" />
        <source type="image/webp" srcset="https://res.cloudinary.com/dyibidxxv/image/upload/v1772918274/homeLightIcon_h25jyb.webp" />
        <img src="https://res.cloudinary.com/dyibidxxv/image/upload/v1772918274/homeLightIcon_h25jyb.webp" alt="Portal" class="logo" />
      </picture>
      <h1 class="brand-title">Portal</h1>
      <p class="brand-tagline">Your creative universe awaits.</p>
    </div>
  </div>

  <!-- Form panel -->
  <div class="form-panel">
    <div class="form-card">

      <!-- Success state -->
      <ng-container *ngIf="sent; else formState">
        <div class="success-state">
          <div class="success-icon">
            <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="26" cy="26" r="25" stroke="#2A9D8F" stroke-width="2"/>
              <path d="M14 27l8 8 16-16" stroke="#2A9D8F" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <h2>Check your inbox</h2>
          <p>We've sent a password reset link to <strong>{{ email.value }}</strong>. It may take a few minutes to arrive.</p>
          <a class="back-link" routerLink="/login">
            <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" width="14" height="14">
              <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Back to sign in
          </a>
        </div>
      </ng-container>

      <ng-template #formState>
        <div class="form-header">
          <h2>Forgot password?</h2>
          <p class="subtitle">Enter your email and we'll send you a reset link.</p>
        </div>

        <form (ngSubmit)="submit()">

          <div class="field-group">
            <label for="email">Email</label>
            <input
              id="email"
              type="email"
              [formControl]="email"
              placeholder="you@example.com"
              autocomplete="email"
            />
            <span class="field-error" *ngIf="email.touched && email.invalid">
              Enter a valid email
            </span>
          </div>

          <div class="error-message" *ngIf="errorMessage">{{ errorMessage }}</div>

          <button type="submit" class="submit-btn" [disabled]="loading">
            {{ loading ? 'Sending…' : 'Send reset link' }}
          </button>

        </form>

        <p class="bottom-link">
          Remembered it?
          <a routerLink="/login">Sign in</a>
        </p>
      </ng-template>

    </div>
  </div>

</div>
