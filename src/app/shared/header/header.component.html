<!-- ── Non-default: world route (usa settings$ do WorldDataService) ── -->
<ng-container *ngIf="!default; else defaultHeader">
  <ng-container *ngIf="settings$ | async as settings">
    <header class="hdr" [class.dark]="settings.theme">
      <div class="hdr__bar">

        <button class="hdr__brand" (click)="GoTo('/')" aria-label="Ir para o início">
          <picture>
            <source type="image/avif"
                    [srcset]="!settings.theme ? 'https://res.cloudinary.com/dyibidxxv/image/upload/v1772918274/homeDarkIcon_efk1t3.avif' : 'https://res.cloudinary.com/dyibidxxv/image/upload/v1772918274/homeLightIcon_opxauw.avif'" />
            <source type="image/webp"
                    [srcset]="!settings.theme ? 'https://res.cloudinary.com/dyibidxxv/image/upload/v1772918274/homeDarkIcon_hook0j.webp' : 'https://res.cloudinary.com/dyibidxxv/image/upload/v1772918274/homeLightIcon_h25jyb.webp'" />
            <img class="hdr__logo"
                 [src]="!settings.theme ? 'https://res.cloudinary.com/dyibidxxv/image/upload/v1772918274/homeDarkIcon_hook0j.webp' : 'https://res.cloudinary.com/dyibidxxv/image/upload/v1772918274/homeLightIcon_h25jyb.webp'"
                 alt="Narratus" />
          </picture>
          <span class="hdr__brand-name">Narratus</span>
        </button>

        <nav class="hdr__nav" aria-label="Navegação principal">
          <button class="hdr__nav-link" (click)="GoTo('/store')">
            <span class="material-icons" aria-hidden="true">shopping_cart</span><span>Store</span>
          </button>
          <button class="hdr__nav-link" (click)="GoTo('/dashboard')" *ngIf="isLogged">
            <span class="material-icons" aria-hidden="true">dashboard</span><span>Dashboard</span>
          </button>
          <button class="hdr__nav-link" (click)="GoTo('/library')">
            <span class="material-icons" aria-hidden="true">library_books</span><span>Biblioteca</span>
          </button>
          <button class="hdr__nav-link" (click)="shareStore()">
            <span class="material-icons" aria-hidden="true">share</span><span>Compartilhar</span>
          </button>
        </nav>

        <div class="hdr__actions">
          <button class="hdr__icon-btn hdr__theme-btn"
                  (click)="toggleTheme(settings)"
                  [title]="settings.theme ? 'Modo claro' : 'Modo escuro'">
            <span class="material-icons" aria-hidden="true">{{ settings.theme ? 'light_mode' : 'dark_mode' }}</span>
          </button>
          <div class="hdr__user-menu-wrap">
            <button class="hdr__icon-btn" (click)="toggleUserMenu($event)" [attr.aria-expanded]="userMenuOpen" aria-label="Menu do usuário">
              <span class="material-icons" aria-hidden="true">account_circle</span>
            </button>
            <div class="hdr__user-menu" [class.open]="userMenuOpen" role="menu">
              <ng-container *ngIf="isLogged; else loginOption">
                <button class="hdr__user-menu-item" (click)="GoTo('/profile'); userMenuOpen=false" role="menuitem">
                  <span class="material-icons" aria-hidden="true">person</span><span>Perfil</span>
                </button>
                <button class="hdr__user-menu-item hdr__user-menu-item--danger" (click)="logout(); userMenuOpen=false" role="menuitem">
                  <span class="material-icons" aria-hidden="true">logout</span><span>Sair</span>
                </button>
              </ng-container>
              <ng-template #loginOption>
                <button class="hdr__user-menu-item" (click)="GoTo('/login'); userMenuOpen=false" role="menuitem">
                  <span class="material-icons" aria-hidden="true">login</span><span>Entrar</span>
                </button>
              </ng-template>
            </div>
          </div>
          <button class="hdr__icon-btn hdr__burger"
                  (click)="menuOpen = !menuOpen"
                  [attr.aria-expanded]="menuOpen"
                  aria-label="Abrir menu">
            <span class="material-icons" aria-hidden="true">{{ menuOpen ? 'close' : 'menu' }}</span>
          </button>
        </div>
      </div>

      <!-- Mobile drawer -->
      <nav class="hdr__drawer" [class.open]="menuOpen" aria-label="Menu mobile">
        <div class="hdr__drawer-nav">
          <button class="hdr__drawer-link" (click)="GoTo('/store'); menuOpen=false">
            <span class="material-icons" aria-hidden="true">shopping_cart</span><span>Store</span>
          </button>
          <button class="hdr__drawer-link" (click)="GoTo('/dashboard'); menuOpen=false" *ngIf="isLogged">
            <span class="material-icons" aria-hidden="true">dashboard</span><span>Dashboard</span>
          </button>
          <button class="hdr__drawer-link" (click)="GoTo('/library'); menuOpen=false">
            <span class="material-icons" aria-hidden="true">library_books</span><span>Biblioteca</span>
          </button>
          <button class="hdr__drawer-link" (click)="shareStore(); menuOpen=false">
            <span class="material-icons" aria-hidden="true">share</span><span>Compartilhar</span>
          </button>
        </div>
        <div class="hdr__drawer-footer">
          <button class="hdr__drawer-link hdr__drawer-link--muted"
                  (click)="toggleTheme(settings); menuOpen=false">
            <span class="material-icons" aria-hidden="true">{{ settings.theme ? 'light_mode' : 'dark_mode' }}</span>
            <span>{{ settings.theme ? 'Modo claro' : 'Modo escuro' }}</span>
          </button>
          <ng-container *ngIf="isLogged; else drawerLogin">
            <button class="hdr__drawer-link hdr__drawer-link--muted"
                    (click)="GoTo('/profile'); menuOpen=false">
              <span class="material-icons" aria-hidden="true">person</span><span>Perfil</span>
            </button>
            <button class="hdr__drawer-link hdr__drawer-link--danger"
                    (click)="logout(); menuOpen=false">
              <span class="material-icons" aria-hidden="true">logout</span><span>Sair</span>
            </button>
          </ng-container>
          <ng-template #drawerLogin>
            <button class="hdr__drawer-link hdr__drawer-link--muted"
                    (click)="GoTo('/login'); menuOpen=false">
              <span class="material-icons" aria-hidden="true">login</span><span>Entrar</span>
            </button>
          </ng-template>
        </div>
      </nav>
    </header>
  </ng-container>
</ng-container>
